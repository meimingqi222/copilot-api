<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copilot API Admin</title>
  <link rel="stylesheet" href="/admin/static/css/apple-theme.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/admin/static/js/i18n.js"></script>
  <script src="/admin/static/js/api.js"></script>
</head>
<body x-data="adminApp()" x-init="init()" x-cloak>
  <!-- Toast Notifications -->
  <div class="fixed top-6 right-6 z-50 space-y-3">
    <template x-for="toast in toasts" :key="toast.id">
      <div class="toast flex items-center gap-3"
           :class="toast.type === 'error' ? 'border-l-4 border-l-[var(--apple-red)]' : (toast.type === 'success' ? 'border-l-4 border-l-[var(--apple-green)]' : 'border-l-4 border-l-[var(--apple-blue)]')">
        <i :data-lucide="toast.type === 'error' ? 'alert-circle' : (toast.type === 'success' ? 'check-circle' : 'info')" class="w-5 h-5"></i>
        <span x-text="toast.message"></span>
      </div>
    </template>
  </div>

  <div class="flex h-screen" x-show="initialized">
    <!-- Sidebar -->
    <aside class="sidebar w-64 flex flex-col">
      <div class="p-6 border-b border-[var(--apple-gray-5)]">
        <h1 class="text-title-3 flex items-center gap-3">
          <div class="w-8 h-8 bg-gradient-to-br from-[var(--apple-blue)] to-[var(--apple-purple)] rounded-lg flex items-center justify-center">
            <i data-lucide="cpu" class="w-5 h-5 text-white"></i>
          </div>
          <span x-text="t('app.name')"></span>
        </h1>
      </div>

      <nav class="flex-1 py-4">
        <template x-for="item in navItems" :key="item.id">
          <a href="#" @click.prevent="currentView = item.id"
             class="nav-item"
             :class="{ 'active': currentView === item.id }">
            <i :data-lucide="item.icon" class="w-5 h-5"></i>
            <span x-text="item.label"></span>
          </a>
        </template>
      </nav>

      <div class="p-4 border-t border-[var(--apple-gray-5)] space-y-4">
        <!-- Language Switcher -->
        <div class="lang-switcher">
          <button @click="setLang('zh')" :class="{ 'active': currentLang === 'zh' }">中文</button>
          <button @click="setLang('en')" :class="{ 'active': currentLang === 'en' }">EN</button>
        </div>

        <button @click="logout()" class="nav-item w-full !mx-0 !text-[var(--apple-text-secondary)] hover:!text-[var(--apple-text)]">
          <i data-lucide="log-out" class="w-5 h-5"></i>
          <span x-text="t('logout')"></span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto p-8 bg-[var(--apple-bg-secondary)]">
      <!-- Dashboard View -->
      <div x-show="currentView === 'dashboard'" x-data="dashboardView()" x-init="load()">
        <header class="flex justify-between items-center mb-8">
          <h2 class="text-headline" x-text="t('dashboard.title')"></h2>
          <div class="flex items-center gap-6">
            <span class="text-body text-[var(--apple-text-secondary)]" x-show="lastRefresh">
              <span x-text="t('dashboard.lastUpdated') + ': '"></span>
              <span x-text="formatTime(lastRefresh)"></span>
            </span>
            <button @click="load()" class="btn btn-secondary" :class="{ 'opacity-75': loading }">
              <i data-lucide="refresh-cw" class="w-4 h-4" :class="{ 'animate-spin': loading }"></i>
              <span x-text="t('refresh')"></span>
            </button>
          </div>
        </header>

        <div x-show="loading" class="flex justify-center items-center py-20">
          <div class="text-center">
            <div class="animate-spin h-12 w-12 border-4 border-[var(--apple-blue)] border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-body text-[var(--apple-text-secondary)]" x-text="t('loading')"></p>
          </div>
        </div>

        <div x-show="!loading" class="animate-slide-in">
          <!-- Stats Grid -->
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="stat-card card card-hover">
              <p class="stat-label mb-2" x-text="t('dashboard.activeUsers')"></p>
              <p class="stat-value" x-text="data.activeUsers || 0"></p>
            </div>
            <div class="stat-card card card-hover">
              <p class="stat-label mb-2" x-text="t('dashboard.activeAccounts')"></p>
              <p class="stat-value" x-text="data.activeAccounts || 0"></p>
              <p class="text-sm text-[var(--apple-text-tertiary)] mt-2" x-text="(data.activeAccounts || 0) + ' / ' + (data.totalAccounts || 0)"></p>
            </div>
            <div class="stat-card card card-hover">
              <p class="stat-label mb-2" x-text="t('dashboard.requestsToday')"></p>
              <p class="stat-value" x-text="data.requestsToday || 0"></p>
            </div>
            <div class="stat-card card card-hover">
              <p class="stat-label mb-2" x-text="t('dashboard.errorsToday')"></p>
              <p class="stat-value text-[var(--apple-red)]" x-text="data.errorsToday || 0"></p>
            </div>
          </div>

          <!-- Two Column Layout -->
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Quota Summary -->
            <div class="card p-6">
              <h3 class="text-title-2 mb-6" x-text="t('dashboard.quotaSummary')"></h3>
              <div x-show="data.quota">
                <div class="flex items-center justify-between mb-3">
                  <span class="text-body" x-text="t('quota.remaining')"></span>
                  <span class="text-title-3">
                    <span x-text="data.quota?.premiumRemaining ?? 'N/A'"></span>
                    <span x-show="data.quota?.premiumTotal" class="text-[var(--apple-text-secondary)]">/ <span x-text="data.quota?.premiumTotal"></span></span>
                  </span>
                </div>
                <div class="progress-bar mb-6">
                  <div class="progress-fill" 
                       :class="quotaColorClass"
                       :style="`width: ${quotaPercent}%`"></div>
                </div>
                <div x-show="data.quota?.unlimited" class="flex items-center gap-2 text-[var(--apple-green)]">
                  <i data-lucide="infinity" class="w-5 h-5"></i>
                  <span class="text-body" x-text="t('dashboard.unlimitedPlan')"></span>
                </div>
              </div>
            </div>

            <!-- Recent Activity -->
            <div class="card p-6">
              <h3 class="text-title-2 mb-6" x-text="t('dashboard.recentActivity')"></h3>
              <div class="space-y-4" x-show="recentLogs.length">
                <template x-for="log in recentLogs" :key="log.id">
                  <div class="flex items-center justify-between py-3 border-b border-[var(--apple-gray-5)] last:border-0">
                    <div class="flex items-center gap-3">
                      <span class="badge" :class="getLevelClass(log.level)" x-text="log.level"></span>
                      <span class="text-body" x-text="log.path"></span>
                    </div>
                    <span class="text-caption text-[var(--apple-text-secondary)]" x-text="formatTime(log.timestamp)"></span>
                  </div>
                </template>
              </div>
              <div x-show="!recentLogs.length" class="empty-state">
                <i data-lucide="activity" class="empty-state-icon"></i>
                <p class="text-body text-[var(--apple-text-secondary)]" x-text="t('dashboard.noActivity')"></p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Users View -->
      <div x-show="currentView === 'users'" x-data="usersView()" x-init="load()" style="display: none;">
        <header class="flex justify-between items-center mb-8">
          <h2 class="text-headline" x-text="t('users.title')"></h2>
          <div class="flex items-center gap-4">
            <button @click="openAddModal()" class="btn btn-primary">
              <i data-lucide="plus" class="w-4 h-4 mr-1"></i>
              <span x-text="t('users.addUser')"></span>
            </button>
            <button @click="load()" class="btn btn-secondary" :class="{ 'opacity-75': loading }">
              <i data-lucide="refresh-cw" class="w-4 h-4" :class="{ 'animate-spin': loading }"></i>
            </button>
          </div>
        </header>

        <div x-show="loading" class="flex justify-center py-20">
          <div class="animate-spin h-12 w-12 border-4 border-[var(--apple-blue)] border-t-transparent rounded-full"></div>
        </div>

        <div x-show="!loading" class="card overflow-hidden">
          <table class="w-full">
            <thead>
              <tr class="border-b border-[var(--apple-gray-5)]">
                <th class="text-left p-4" x-text="t('users.username')"></th>
                <th class="text-left p-4" x-text="t('users.role')"></th>
                <th class="text-left p-4" x-text="t('users.status.label')"></th>
                <th class="text-right p-4" x-text="t('users.actions')"></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="user in users" :key="user.id">
                <tr class="border-b border-[var(--apple-gray-5)] last:border-0">
                  <td class="p-4 font-medium" x-text="user.username"></td>
                  <td class="p-4">
                    <span class="badge" :class="user.role === 'admin' ? 'badge-warning' : 'badge-info'" x-text="t('users.role.' + user.role)"></span>
                  </td>
                  <td class="p-4">
                    <span class="badge" :class="user.enabled ? 'badge-success' : 'badge-danger'" x-text="t(user.enabled ? 'users.status.enabled' : 'users.status.disabled')"></span>
                  </td>
                  <td class="p-4 text-right">
                    <button @click="editUser(user)" class="btn btn-secondary btn-small mr-2">
                      <i data-lucide="pencil" class="w-4 h-4"></i>
                    </button>
                    <button @click="resetApiKey(user)" class="btn btn-secondary btn-small mr-2">
                      <i data-lucide="key" class="w-4 h-4"></i>
                    </button>
                    <button @click="deleteUser(user.id)" class="btn btn-danger btn-small">
                      <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
          <div x-show="!users.length" class="empty-state py-12">
            <i data-lucide="users" class="empty-state-icon"></i>
            <p class="text-body text-[var(--apple-text-secondary)]" x-text="t('users.noUsers')"></p>
          </div>
        </div>

        <!-- Add Modal -->
        <div x-show="showAddModal" class="fixed inset-0 modal-backdrop flex items-center justify-center z-40" x-cloak>
          <div class="modal-content p-8 w-full max-w-md" @click.away="showAddModal = false">
            <h3 class="text-title-2 mb-6" x-text="t('users.addUser')"></h3>
            <div class="space-y-4">
              <div>
                <label class="block text-sm text-[var(--apple-text-secondary)] mb-2" x-text="t('users.username')"></label>
                <input x-model="newUser.username" type="text" class="input" :placeholder="t('users.username')">
              </div>
              <div>
                <label class="block text-sm text-[var(--apple-text-secondary)] mb-2" x-text="t('users.role.label')"></label>
                <select x-model="newUser.role" class="input">
                  <option value="user" x-text="t('users.role.user')"></option>
                  <option value="admin" x-text="t('users.role.admin')"></option>
                </select>
              </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
              <button @click="showAddModal = false" class="btn btn-secondary" x-text="t('cancel')"></button>
              <button @click="createUser()" class="btn btn-primary" x-text="t('create')"></button>
            </div>
          </div>
        </div>

        <!-- API Key Display Modal -->
        <div x-show="showKeyModal" class="fixed inset-0 modal-backdrop flex items-center justify-center z-50" x-cloak>
          <div class="modal-content p-8 w-full max-w-lg" @click.away="showKeyModal = false">
            <div class="text-center mb-6">
              <div class="w-16 h-16 bg-[var(--apple-green)] rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="key" class="w-8 h-8 text-white"></i>
              </div>
              <h3 class="text-title-2 mb-2" x-text="t('users.newApiKey')"></h3>
              <p class="text-body text-[var(--apple-text-secondary)]" x-text="t('users.keyWarning')"></p>
            </div>
            <div class="bg-[var(--apple-bg-secondary)] rounded-xl p-4 mb-6">
              <code class="text-sm font-mono break-all text-[var(--apple-text)]" x-text="displayedApiKey"></code>
            </div>
            <div class="flex justify-center gap-3">
              <button @click="navigator.clipboard.writeText(displayedApiKey); showToast(t('copySuccess') || 'Copied!', 'success');" class="btn btn-primary">
                <i data-lucide="copy" class="w-4 h-4 mr-2"></i>
                <span x-text="t('copy')"></span>
              </button>
              <button @click="showKeyModal = false" class="btn btn-secondary" x-text="t('close')"></button>
            </div>
          </div>
        </div>
      </div>

      <!-- Accounts View -->
      <div x-show="currentView === 'accounts'" x-data="accountsView()" x-init="load()" style="display: none;">
        <header class="flex justify-between items-center mb-8">
          <h2 class="text-headline" x-text="t('accounts.title')"></h2>
          <div class="flex items-center gap-4">
            <button @click="openAddModal()" class="btn btn-primary">
              <i data-lucide="plus" class="w-4 h-4 mr-1"></i>
              <span x-text="t('accounts.addAccount')"></span>
            </button>
            <button @click="load()" class="btn btn-secondary" :class="{ 'opacity-75': loading }">
              <i data-lucide="refresh-cw" class="w-4 h-4" :class="{ 'animate-spin': loading }"></i>
            </button>
          </div>
        </header>

        <div x-show="loading" class="flex justify-center py-20">
          <div class="animate-spin h-12 w-12 border-4 border-[var(--apple-blue)] border-t-transparent rounded-full"></div>
        </div>

        <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <template x-for="account in accounts" :key="account.id">
            <div class="card p-6">
              <div class="flex items-start justify-between mb-4">
                <div class="flex items-center gap-3">
                  <i data-lucide="github" class="w-8 h-8"></i>
                  <div>
                    <p class="font-medium" x-text="account.label || account.username || 'GitHub'"></p>
                    <p class="text-sm text-[var(--apple-text-secondary)]" x-text="account.username || '-'"></p>
                  </div>
                </div>
                <span class="badge" :class="account.isActive ? 'badge-success' : 'badge-danger'" x-text="t(account.isActive ? 'accounts.status.active' : 'accounts.status.inactive')"></span>
              </div>
              <div class="text-sm text-[var(--apple-text-secondary)] mb-4">
                <p x-text="t('accounts.requestsToday') + ': ' + (account.requestsToday || 0)"></p>
                <p x-text="t('accounts.errorsToday') + ': ' + (account.errorsToday || 0)"></p>
              </div>
              <div class="flex gap-2">
                <button @click="refreshToken(account.id)" class="btn btn-secondary btn-small flex-1" x-text="t('accounts.refresh')"></button>
                <button @click="deleteAccount(account.id)" class="btn btn-danger btn-small" x-text="t('delete')"></button>
              </div>
            </div>
          </template>
          <div x-show="!accounts.length" class="col-span-full empty-state py-12">
            <i data-lucide="github" class="empty-state-icon"></i>
            <p class="text-body text-[var(--apple-text-secondary)]" x-text="t('accounts.noAccounts')"></p>
          </div>
        </div>

        <!-- Add Modal -->
        <div x-show="showAddModal" class="fixed inset-0 modal-backdrop flex items-center justify-center z-40" x-cloak>
          <div class="modal-content p-8 w-full max-w-md" @click.away="closeAddModal()">
            <h3 class="text-title-2 mb-6" x-text="t('accounts.deviceFlow.title')"></h3>
            <div x-show="deviceFlowStep === 'input'">
              <div class="mb-6">
                <label class="block text-sm text-[var(--apple-text-secondary)] mb-2" x-text="t('accounts.label')"></label>
                <input x-model="newLabel" type="text" placeholder="work, personal..." class="input">
              </div>
              <div class="flex justify-end gap-3">
                <button @click="closeAddModal()" class="btn btn-secondary" x-text="t('cancel')"></button>
                <button @click="startDeviceFlow()" class="btn btn-primary" x-text="t('accounts.deviceFlow.step2')"></button>
              </div>
            </div>
            <div x-show="deviceFlowStep === 'pending'" class="text-center py-6">
              <div class="animate-spin h-10 w-10 border-4 border-[var(--apple-blue)] border-t-transparent rounded-full mx-auto mb-6"></div>
              <p class="text-body text-[var(--apple-text-secondary)] mb-4" x-text="t('accounts.deviceFlow.instruction')"></p>
              <a :href="deviceFlowData?.verificationUri" target="_blank" class="text-[var(--apple-blue)] hover:underline text-body" x-text="deviceFlowData?.verificationUri"></a>
              <p class="text-3xl font-mono font-bold my-6 tracking-widest" x-text="deviceFlowData?.userCode"></p>
              <p class="text-caption text-[var(--apple-text-secondary)]" x-text="t('accounts.deviceFlow.waiting')"></p>
            </div>
            <div x-show="deviceFlowStep === 'success'" class="text-center py-6">
              <div class="w-16 h-16 bg-[var(--apple-green)] rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="check" class="w-8 h-8 text-white"></i>
              </div>
              <h4 class="text-title-2 mb-2" x-text="t('accounts.deviceFlow.success')"></h4>
              <button @click="showAddModal = false; load()" class="btn btn-primary mt-4" x-text="t('done')"></button>
            </div>
          </div>
        </div>
      </div>

      <!-- Quota View -->
      <div x-show="currentView === 'quota'" x-data="quotaView()" x-init="init()" style="display: none;">
        <header class="flex justify-between items-center mb-8">
          <h2 class="text-headline" x-text="t('quota.title')"></h2>
          <button @click="refresh()" class="btn btn-secondary" :class="{ 'opacity-75': refreshing }">
            <i data-lucide="refresh-cw" class="w-4 h-4" :class="{ 'animate-spin': refreshing }"></i>
            <span x-text="t('refresh')"></span>
          </button>
        </header>

        <div x-show="loading" class="flex justify-center py-20">
          <div class="animate-spin h-12 w-12 border-4 border-[var(--apple-blue)] border-t-transparent rounded-full"></div>
        </div>

        <div x-show="!loading" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <!-- Account Quotas -->
          <div class="card p-6">
            <h3 class="text-title-2 mb-2" x-text="t('quota.accountQuotas')"></h3>
            <p class="text-sm text-[var(--apple-text-secondary)] mb-6" x-text="t('quota.accountQuotasDesc')"></p>
            <div class="space-y-6">
              <template x-for="account in accounts" :key="account.id">
                <div class="pb-6 border-b border-[var(--apple-gray-5)] last:border-0 last:pb-0">
                  <div class="flex items-center gap-3 mb-4">
                    <i data-lucide="github" class="w-5 h-5"></i>
                    <span class="font-medium text-body" x-text="account.label"></span>
                    <span x-show="account.isActive" class="px-2 py-0.5 text-xs font-medium bg-[var(--apple-green)] text-white rounded-full" x-text="t('quota.active')"></span>
                  </div>

                  <!-- Premium Interactions -->
                  <div class="mb-3">
                    <div class="flex justify-between items-center mb-1">
                      <span class="text-sm text-[var(--apple-text-secondary)]" x-text="t('quota.premium')"></span>
                      <span class="text-sm font-medium">
                        <span x-text="account.quotaInfo?.premiumInteractionsRemaining ?? 'N/A'"></span>
                        <span class="text-[var(--apple-text-secondary)]">/ <span x-text="account.quotaInfo?.premiumInteractionsTotal ?? 'N/A'"></span></span>
                      </span>
                    </div>
                    <div class="progress-bar" x-show="account.quotaInfo?.premiumInteractionsTotal">
                      <div class="progress-fill"
                           :class="getUsageColor((account.quotaInfo?.premiumInteractionsTotal || 0) - (account.quotaInfo?.premiumInteractionsRemaining || 0), account.quotaInfo?.premiumInteractionsTotal)"
                           :style="`width: ${calculatePercent(account.quotaInfo?.premiumInteractionsRemaining, account.quotaInfo?.premiumInteractionsTotal)}%`"></div>
                    </div>
                  </div>

                  <!-- Chat -->
                  <div class="flex justify-between items-center py-1">
                    <span class="text-sm text-[var(--apple-text-secondary)]" x-text="t('quota.chat')"></span>
                    <span class="text-sm">
                      <span x-text="account.quotaInfo?.unlimited ? t('quota.unlimited') : (account.quotaInfo?.chatRemaining ?? 'N/A')"></span>
                    </span>
                  </div>

                  <!-- Completions -->
                  <div class="flex justify-between items-center py-1">
                    <span class="text-sm text-[var(--apple-text-secondary)]" x-text="t('quota.completions')"></span>
                    <span class="text-sm">
                      <span x-text="account.quotaInfo?.unlimited ? t('quota.unlimited') : (account.quotaInfo?.completionsRemaining ?? 'N/A')"></span>
                    </span>
                  </div>
                </div>
              </template>
              <div x-show="!accounts.length" class="empty-state">
                <i data-lucide="github" class="empty-state-icon"></i>
                <p class="text-body text-[var(--apple-text-secondary)]" x-text="t('accounts.noAccounts')"></p>
              </div>
            </div>
          </div>

          <!-- User Usage -->
          <div class="card p-6">
            <h3 class="text-title-2 mb-2" x-text="t('quota.userUsage')"></h3>
            <p class="text-sm text-[var(--apple-text-secondary)] mb-6" x-text="t('quota.userUsageDesc')"></p>
            <div class="space-y-6">
              <template x-for="user in users" :key="user.id">
                <div class="pb-6 border-b border-[var(--apple-gray-5)] last:border-0 last:pb-0">
                  <div class="flex justify-between items-center mb-3">
                    <span class="font-medium" x-text="user.username"></span>
                    <div class="text-right">
                      <div class="text-title-3">
                        <span x-text="formatTokens(user.usedTokens || 0)"></span>
                        <span x-show="user.quotaLimit" class="text-[var(--apple-text-secondary)]">/ <span x-text="formatTokens(user.quotaLimit || 0)"></span></span>
                      </div>
                      <div class="text-xs text-[var(--apple-text-secondary)]">
                        <span x-text="t('quota.used')"></span>
                        <span x-show="user.quotaLimit" x-text="t('quota.quotaLabel')"></span>
                      </div>
                    </div>
                  </div>
                  <div class="progress-bar" x-show="user.quotaLimit">
                    <div class="progress-fill"
                         :class="getUsageColor(user.usedTokens, user.quotaLimit)"
                         :style="`width: ${calculatePercent(user.quotaLimit - (user.usedTokens || 0), user.quotaLimit)}%`"></div>
                  </div>
                  <p x-show="!user.quotaLimit" class="text-sm text-[var(--apple-text-secondary)]">
                    <span x-text="t('quota.quotaLabel') + ': '"></span>
                    <span x-text="t('quota.unlimited')"></span>
                  </p>
                </div>
              </template>
              <div x-show="!users.length" class="empty-state">
                <i data-lucide="users" class="empty-state-icon"></i>
                <p class="text-body text-[var(--apple-text-secondary)]" x-text="t('users.noUsers')"></p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Logs View -->
      <div x-show="currentView === 'logs'" x-data="logsView()" x-init="init(); load()" style="display: none;">
        <header class="flex justify-between items-center mb-8">
          <h2 class="text-headline" x-text="t('logs.title')"></h2>
          <div class="flex items-center gap-4">
            <button @click="autoRefresh = !autoRefresh" class="btn" :class="autoRefresh ? 'btn-primary' : 'btn-secondary'">
              <i data-lucide="clock" class="w-4 h-4 mr-1"></i>
              <span x-text="autoRefresh ? t('logs.autoRefreshOn') : t('logs.autoRefreshOff')"></span>
            </button>
            <button @click="load()" class="btn btn-secondary" :class="{ 'opacity-75': loading }">
              <i data-lucide="refresh-cw" class="w-4 h-4" :class="{ 'animate-spin': loading }"></i>
            </button>
          </div>
        </header>

        <!-- Filters -->
        <div class="card p-4 mb-6 flex flex-wrap gap-4 items-center">
          <select x-model="filters.level" @change="filters.offset = 0; load()" class="input w-32">
            <option value="" x-text="t('logs.allLevels')"></option>
            <option value="debug">Debug</option>
            <option value="info">Info</option>
            <option value="warn">Warn</option>
            <option value="error">Error</option>
          </select>
          <input x-model="filters.search" @keyup.enter="filters.offset = 0; load()" type="text" :placeholder="t('logs.search')" class="input flex-1 min-w-[200px]">
          <button @click="filters = { level: '', search: '', limit: 50, offset: 0 }; load()" class="btn btn-secondary" x-text="t('logs.clearFilters')"></button>
        </div>

        <div x-show="loading" class="flex justify-center py-20">
          <div class="animate-spin h-12 w-12 border-4 border-[var(--apple-blue)] border-t-transparent rounded-full"></div>
        </div>

        <div x-show="!loading" class="card overflow-hidden">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-[var(--apple-gray-5)] bg-[var(--apple-bg-secondary)]">
                <th class="text-left p-3" x-text="t('logs.time')"></th>
                <th class="text-left p-3" x-text="t('logs.level')"></th>
                <th class="text-left p-3" x-text="t('logs.path')"></th>
                <th class="text-left p-3" x-text="t('logs.user')"></th>
                <th class="text-left p-3" x-text="t('logs.model')"></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="log in entries" :key="log.id">
                <tr class="border-b border-[var(--apple-gray-5)] last:border-0 hover:bg-[var(--apple-bg-secondary)]">
                  <td class="p-3 text-[var(--apple-text-secondary)]" x-text="formatTime(log.timestamp)"></td>
                  <td class="p-3">
                    <span class="badge" :class="getLevelClass(log.level)" x-text="log.level"></span>
                  </td>
                  <td class="p-3 font-mono" x-text="log.path"></td>
                  <td class="p-3" x-text="log.username || '-'"></td>
                  <td class="p-3" x-text="log.model || '-'"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div x-show="!entries.length" class="empty-state py-12">
            <i data-lucide="scroll-text" class="empty-state-icon"></i>
            <p class="text-body text-[var(--apple-text-secondary)]" x-text="t('logs.noLogs')"></p>
          </div>
        </div>

        <!-- Pagination -->
        <div class="flex justify-between items-center mt-6" x-show="total > 0">
          <span class="text-body text-[var(--apple-text-secondary)]" x-text="`${filters.offset + 1} - ${Math.min(filters.offset + filters.limit, total)} of ${total}`"></span>
          <div class="flex gap-3">
            <button @click="prevPage()" :disabled="filters.offset === 0" class="btn btn-secondary btn-small" :class="{ 'opacity-50': filters.offset === 0 }" x-text="t('logs.previous')"></button>
            <button @click="nextPage()" :disabled="filters.offset + filters.limit >= total" class="btn btn-secondary btn-small" :class="{ 'opacity-50': filters.offset + filters.limit >= total }" x-text="t('logs.next')"></button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Main Admin App
    function adminApp() {
      return {
        currentView: 'dashboard',
        initialized: false,
        toasts: [],
        lang: I18n.currentLang(),

        async init() {
          await this.checkAuth();
          this.initialized = true;
          lucide.createIcons();
          // Refresh quotas in background after login
          this.refreshQuotaInBackground();
        },

        async refreshQuotaInBackground() {
          try {
            // Silently refresh quotas from GitHub Copilot API
            await API.quota.refresh();
          } catch (e) {
            // Silent fail - quotas will be loaded from cache on quota view
            console.warn('Background quota refresh failed:', e);
          }
        },

        async checkAuth() {
          try {
            const isAuth = await API.auth.check();
            if (!isAuth) window.location.href = '/admin/login';
          } catch (e) {
            window.location.href = '/admin/login';
          }
        },

        // i18n helpers
        t(key, params = {}) {
          // Access this.lang to establish reactive dependency
          void this.lang;
          return I18n.t(key, params);
        },

        get currentLang() {
          return this.lang;
        },

        setLang(lang) {
          I18n.setLang(lang);
          this.lang = lang;
          this.$nextTick(() => lucide.createIcons());
        },

        formatTime(ts) {
          if (!ts) return '-';
          return new Date(ts).toLocaleString(this.currentLang === 'zh' ? 'zh-CN' : 'en-US');
        },

        get navItems() {
          return [
            { id: 'dashboard', icon: 'layout-dashboard', label: this.t('nav.dashboard') },
            { id: 'users', icon: 'users', label: this.t('nav.users') },
            { id: 'accounts', icon: 'github', label: this.t('nav.accounts') },
            { id: 'quota', icon: 'bar-chart-3', label: this.t('nav.quota') },
            { id: 'logs', icon: 'scroll-text', label: this.t('nav.logs') }
          ];
        },

        // Toast notifications
        showToast(message, type = 'info', duration = 5000) {
          const id = Date.now() + Math.random();
          this.toasts.push({ id, message, type });
          setTimeout(() => {
            this.toasts = this.toasts.filter(t => t.id !== id);
          }, duration);
        },

        async logout() {
          await API.auth.logout();
          window.location.href = '/admin/login';
        }
      };
    }

    // Dashboard View Component
    function dashboardView() {
      return {
        loading: false,
        lastRefresh: null,
        data: { activeUsers: 0, activeAccounts: 0, totalAccounts: 0, requestsToday: 0, errorsToday: 0, quota: null },
        recentLogs: [],

        async load() {
          this.loading = true;
          try {
            const [dashboard, recent] = await Promise.all([
              API.dashboard.get(),
              API.logs.getRecent(5)
            ]);
            this.data = dashboard;
            this.recentLogs = recent.entries || [];
            this.lastRefresh = new Date();
          } catch (e) {
            this.showToast(I18n.t('error.load'), 'error');
          } finally {
            this.loading = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        get quotaPercent() {
          const q = this.data.quota;
          if (!q || q.unlimited || !q.premiumTotal) return 0;
          return ((q.premiumTotal - (q.premiumRemaining || 0)) / q.premiumTotal * 100);
        },

        get quotaColorClass() {
          const pct = this.quotaPercent;
          if (pct > 90) return 'bg-[var(--apple-red)]';
          if (pct > 75) return 'bg-[var(--apple-orange)]';
          return 'bg-[var(--apple-blue)]';
        },

        getLevelClass(level) {
          const map = { debug: 'badge-info', info: 'badge-success', warn: 'badge-warning', error: 'badge-danger' };
          return map[level] || 'badge-info';
        },

        showToast(msg, type) {
          const app = document.querySelector('[x-data^=adminApp]');
          if (app) Alpine.$data(app).showToast(msg, type);
        },
        formatTime(ts) {
          if (!ts) return '-';
          const app = document.querySelector('[x-data^=adminApp]');
          return app ? Alpine.$data(app).formatTime(ts) : new Date(ts).toLocaleString();
        },
        t(key, params) {
          // Access parent lang to establish reactive dependency
          const app = document.querySelector('[x-data^=adminApp]');
          if (app) void Alpine.$data(app).lang;
          return I18n.t(key, params);
        }
      };
    }

    // Users View Component
    function usersView() {
      return {
        loading: false,
        users: [],
        showAddModal: false,
        showKeyModal: false,
        displayedApiKey: '',
        newUser: { username: '', role: 'user' },

        async load() {
          this.loading = true;
          try {
            const data = await API.users.list();
            this.users = data.users || [];
          } catch (e) {
            this.showToast(I18n.t('error.load'), 'error');
          } finally {
            this.loading = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        openAddModal() {
          this.newUser = { username: '', role: 'user' };
          this.showAddModal = true;
        },

        async createUser() {
          try {
            const result = await API.users.create(this.newUser);
            this.showAddModal = false;
            this.showToast(I18n.t('users.createSuccess'), 'success');
            // Display the API key to the admin
            if (result.user && result.user.apiKey) {
              this.displayedApiKey = result.user.apiKey;
              this.showKeyModal = true;
            }
            await this.load();
          } catch (e) {
            this.showToast(I18n.t('error.create'), 'error');
          }
        },

        async editUser(user) {
          try {
            await API.users.update(user.id, { enabled: !user.enabled });
            await this.load();
          } catch (e) {
            this.showToast(I18n.t('error.update'), 'error');
          }
        },

        async resetApiKey(user) {
          if (!confirm(I18n.t('users.confirmReset'))) return;
          try {
            const result = await API.users.resetKey(user.id);
            this.showToast(I18n.t('users.resetSuccess'), 'success');
            // Display the new API key to the admin
            if (result.apiKey) {
              this.displayedApiKey = result.apiKey;
              this.showKeyModal = true;
            }
          } catch (e) {
            this.showToast(I18n.t('error.update'), 'error');
          }
        },

        async deleteUser(id) {
          if (!confirm(I18n.t('users.confirmDelete'))) return;
          try {
            await API.users.delete(id);
            this.showToast(I18n.t('users.deleteSuccess'), 'success');
            await this.load();
          } catch (e) {
            this.showToast(I18n.t('error.delete'), 'error');
          }
        },

        showToast(msg, type) {
          const app = document.querySelector('[x-data^=adminApp]');
          if (app) Alpine.$data(app).showToast(msg, type);
        },
        t(key, params) {
          // Access parent lang to establish reactive dependency
          const app = document.querySelector('[x-data^=adminApp]');
          if (app) void Alpine.$data(app).lang;
          return I18n.t(key, params);
        }
      };
    }

    // Accounts View Component
    function accountsView() {
      return {
        loading: false,
        accounts: [],
        showAddModal: false,
        newLabel: '',
        deviceFlowStep: 'input',
        deviceFlowData: null,
        pollTimer: null,

        async load() {
          this.loading = true;
          try {
            const data = await API.accounts.list();
            this.accounts = data.accounts || [];
          } catch (e) {
            this.showToast(I18n.t('error.load'), 'error');
          } finally {
            this.loading = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        openAddModal() {
          this.newLabel = '';
          this.deviceFlowStep = 'input';
          this.deviceFlowData = null;
          this.showAddModal = true;
          if (this.pollTimer) clearTimeout(this.pollTimer);
          this.pollTimer = null;
        },

        closeAddModal() {
          this.showAddModal = false;
          this.deviceFlowStep = 'input';
          if (this.pollTimer) {
            clearTimeout(this.pollTimer);
            this.pollTimer = null;
          }
        },

        async startDeviceFlow() {
          this.pollTimer = null;
          try {
            const res = await API.accounts.create(this.newLabel);
            this.deviceFlowData = res;
            this.deviceFlowStep = 'pending';
            this.pollDeviceFlow();
          } catch (e) {
            this.showToast(I18n.t('error.create'), 'error');
          }
        },

        pollDeviceFlow() {
          let pollInterval = this.deviceFlowData.interval * 1000 || 5000;

          const doPoll = async () => {
            if (this.deviceFlowStep !== 'pending') {
              return;
            }
            try {
              const res = await API.accounts.poll(this.deviceFlowData.deviceCode);
              if (res.status === 'complete') {
                this.deviceFlowStep = 'success';
                // Refresh accounts list to show the new account
                await this.load();
                return;
              }
              if (res.status === 'expired') {
                this.deviceFlowStep = 'input';
                this.showToast(I18n.t('accounts.deviceFlow.expired') || 'Device flow expired. Please try again.', 'error');
                return;
              }
              // Update interval if server asks for slow_down
              if (res.interval) {
                pollInterval = res.interval * 1000;
              }
            } catch (e) {
              // Continue polling
            }
            // Schedule next poll with current interval
            this.pollTimer = setTimeout(doPoll, pollInterval);
          };

          this.pollTimer = setTimeout(doPoll, pollInterval);
        },

        async refreshToken(id) {
          try {
            await API.accounts.refresh(id);
            this.showToast(I18n.t('accounts.refreshSuccess'), 'success');
            await this.load();
          } catch (e) {
            this.showToast(I18n.t('error.update'), 'error');
          }
        },

        async deleteAccount(id) {
          if (!confirm(I18n.t('accounts.confirmDelete'))) return;
          try {
            await API.accounts.delete(id);
            this.showToast(I18n.t('accounts.deleteSuccess'), 'success');
            await this.load();
          } catch (e) {
            this.showToast(I18n.t('error.delete'), 'error');
          }
        },

        showToast(msg, type) {
          const app = document.querySelector('[x-data^=adminApp]');
          if (app) Alpine.$data(app).showToast(msg, type);
        },
        t(key, params) {
          // Access parent lang to establish reactive dependency
          const app = document.querySelector('[x-data^=adminApp]');
          if (app) void Alpine.$data(app).lang;
          return I18n.t(key, params);
        }
      };
    }

    // Quota View Component
    function quotaView() {
      return {
        loading: false,
        refreshing: false,
        accounts: [],
        users: [],

        init() {
          // Initial load
          this.load();
          // Reload when view becomes active (switched back to quota)
          const app = document.querySelector('[x-data^=adminApp]');
          if (app) {
            Alpine.$data(app).$watch('currentView', (view) => {
              if (view === 'quota') this.load();
            });
          }
        },

        async load() {
          this.loading = true;
          try {
            const data = await API.quota.get();
            this.accounts = data.accounts || [];
            this.users = data.users || [];
          } catch (e) {
            this.showToast(I18n.t('error.load'), 'error');
          } finally {
            this.loading = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        async refresh() {
          this.refreshing = true;
          try {
            await API.quota.refresh();
            this.showToast(I18n.t('quota.refreshSuccess'), 'success');
            await this.load();
          } catch (e) {
            this.showToast(I18n.t('quota.refreshError'), 'error');
          } finally {
            this.refreshing = false;
          }
        },

        calculatePercent(remaining, total) {
          if (!total) return 0;
          return Math.min(((total - (remaining || 0)) / total * 100), 100);
        },

        getUsageColor(used, limit) {
          if (!limit) return 'bg-[var(--apple-green)]';
          const pct = (used || 0) / limit;
          if (pct > 0.9) return 'bg-[var(--apple-red)]';
          if (pct > 0.75) return 'bg-[var(--apple-orange)]';
          return 'bg-[var(--apple-green)]';
        },

        // Format token count with appropriate unit (K, M, or raw)
        formatTokens(tokens) {
          if (tokens === 0) return '0';
          if (tokens >= 1000000) {
            return (tokens / 1000000).toFixed(1) + 'M';
          }
          if (tokens >= 1000) {
            return (tokens / 1000).toFixed(1) + 'K';
          }
          return tokens.toString();
        },

        showToast(msg, type) {
          const app = document.querySelector('[x-data^=adminApp]');
          if (app) Alpine.$data(app).showToast(msg, type);
        },
        t(key, params) {
          // Access parent lang to establish reactive dependency
          const app = document.querySelector('[x-data^=adminApp]');
          if (app) void Alpine.$data(app).lang;
          return I18n.t(key, params);
        }
      };
    }

    // Logs View Component
    function logsView() {
      return {
        loading: false,
        entries: [],
        total: 0,
        autoRefresh: false,
        refreshTimer: null,
        filters: { level: '', search: '', limit: 50, offset: 0 },

        init() {
          // Watch autoRefresh and start/stop timer accordingly
          this.$watch('autoRefresh', (enabled) => {
            if (enabled) {
              this.startAutoRefresh();
            } else {
              this.stopAutoRefresh();
            }
          });
        },

        startAutoRefresh() {
          // Refresh every 5 seconds when auto-refresh is enabled
          this.refreshTimer = setInterval(() => {
            this.load();
          }, 5000);
        },

        stopAutoRefresh() {
          if (this.refreshTimer) {
            clearInterval(this.refreshTimer);
            this.refreshTimer = null;
          }
        },

        async load() {
          this.loading = true;
          try {
            const data = await API.logs.get(this.filters);
            this.entries = data.entries || [];
            this.total = data.total || 0;
          } catch (e) {
            this.showToast(I18n.t('error.load'), 'error');
          } finally {
            this.loading = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        prevPage() {
          if (this.filters.offset >= this.filters.limit) {
            this.filters.offset -= this.filters.limit;
            this.load();
          }
        },

        nextPage() {
          if (this.filters.offset + this.filters.limit < this.total) {
            this.filters.offset += this.filters.limit;
            this.load();
          }
        },

        getLevelClass(level) {
          const map = { debug: 'badge-info', info: 'badge-success', warn: 'badge-warning', error: 'badge-danger' };
          return map[level] || 'badge-info';
        },

        showToast(msg, type) {
          const app = document.querySelector('[x-data^=adminApp]');
          if (app) Alpine.$data(app).showToast(msg, type);
        },
        formatTime(ts) {
          if (!ts) return '-';
          const app = document.querySelector('[x-data^=adminApp]');
          return app ? Alpine.$data(app).formatTime(ts) : new Date(ts).toLocaleString();
        },
        t(key, params) {
          // Access parent lang to establish reactive dependency
          const app = document.querySelector('[x-data^=adminApp]');
          if (app) void Alpine.$data(app).lang;
          return I18n.t(key, params);
        }
      };
    }
  </script>
</body>
</html>
